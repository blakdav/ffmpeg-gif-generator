<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vid2gif</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0f;
    --surface: #181819;
    --border: #2a2a2d;
    --accent: #00ff88;
    --accent-dim: #00ff8822;
    --accent-mid: #00ff8855;
    --text: #e8e8e8;
    --text-dim: #666;
    --error: #ff4466;
    --warning: #ffaa00;
    --ok: #00ff88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header { text-align: center; margin-bottom: 40px; }

  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent-mid);
  }

  header p {
    color: var(--text-dim);
    margin-top: 6px;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 600px;
    margin-bottom: 20px;
  }

  .card h2 {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 18px;
  }

  #browseBtn {
    width: 100%;
    padding: 20px;
    background: var(--bg);
    color: var(--text);
    border: 2px dashed var(--border);
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  #browseBtn:hover { border-color: var(--accent); color: var(--accent); }
  #browseBtn.has-file { border-style: solid; border-color: var(--accent); color: var(--accent); }
  #fileInput { display: none; }

  .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .param-group { display: flex; flex-direction: column; gap: 6px; }
  .param-group.full { grid-column: 1 / -1; }

  label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .input-row { display: flex; align-items: center; gap: 10px; }

  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-mid);
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .value-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    min-width: 52px;
    text-align: right;
  }

  /* Trim slider */
  #trimSection {
    display: none;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .trim-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .trim-clip-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  .trim-clip-badge span { color: var(--accent); }

  .trim-slider-wrap {
    position: relative;
    height: 36px;
    display: flex;
    align-items: center;
    margin: 0 9px;
  }

  .trim-track {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
  }

  .trim-range {
    position: absolute;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    pointer-events: none;
  }

  .trim-handle {
    position: absolute;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: grab;
    transform: translateX(-50%);
    box-shadow: 0 0 8px var(--accent-mid);
    z-index: 2;
    top: 50%;
    margin-top: -9px;
    transition: box-shadow 0.15s;
  }

  .trim-handle:hover, .trim-handle.dragging {
    transform: translateX(-50%) scale(1.25);
    box-shadow: 0 0 14px var(--accent);
    cursor: grabbing;
  }

  .trim-times {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }

  .trim-time {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
  }

  .trim-total {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    text-align: center;
    margin-top: 6px;
  }

  /* Size estimator */
  #sizeEstimator {
    display: none;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .estimator-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .estimator-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .size-display { display: flex; align-items: center; gap: 10px; }

  .size-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    transition: color 0.3s;
    min-width: 70px;
    text-align: right;
  }

  .size-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    max-width: 180px;
  }

  .size-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s, background 0.3s;
    width: 0%;
  }

  .green { color: var(--ok); background: var(--ok); }
  .yellow { color: var(--warning); background: var(--warning); }
  .red { color: var(--error); background: var(--error); }
  .size-value.green { background: transparent; }
  .size-value.yellow { background: transparent; }
  .size-value.red { background: transparent; }

  .size-note {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 8px;
  }

  /* Convert */
  #convertBtn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }

  #convertBtn:hover:not(:disabled) {
    background: #00ffaa;
    box-shadow: 0 0 20px var(--accent-mid);
    transform: translateY(-1px);
  }

  #convertBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #progressWrap { display: none; flex-direction: column; gap: 10px; margin-top: 14px; }

  .progress-bar-outer { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }

  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 0.3s;
    animation: progressPulse 1.5s ease-in-out infinite;
  }

  @keyframes progressPulse {
    0%, 100% { box-shadow: 0 0 10px var(--accent-mid); }
    50% { box-shadow: 0 0 20px var(--accent); }
  }

  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    text-align: center;
  }

  #errorBox {
    display: none;
    background: #1a0810;
    border: 1px solid var(--error);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--error);
    margin-top: 12px;
  }

  /* Result */
  #resultCard { display: none; }

  .result-preview {
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    text-align: center;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  .result-preview img { max-width: 100%; max-height: 300px; display: block; margin: 0 auto; }

  .result-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }

  .meta-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  .meta-chip span { color: var(--accent); }

  #downloadBtn {
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }

  #downloadBtn:hover { background: var(--accent-dim); box-shadow: 0 0 16px var(--accent-dim); }

  .history-list {
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
  }

  .hi-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .hi-meta {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .hi-dl {
    color: var(--accent);
    font-size: 0.8rem;
    cursor: pointer;
    text-decoration: none;
    padding: 2px 8px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    transition: background 0.15s;
  }

  .hi-dl:hover { background: var(--accent-dim); }

  .formats-note {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: -8px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <h1>vid2gif</h1>
  <p>by blake</p>
</header>

<div class="card">
  <h2>01 — Input</h2>
  <button id="browseBtn" onclick="document.getElementById('fileInput').click()">Browse for video</button>
  <div id="fileName" style="font-family:'Space Mono',monospace;font-size:0.85rem;color:var(--accent);margin-top:14px;word-break:break-all;"></div>
  <input type="file" id="fileInput" accept="video/*">
</div>

<p class="formats-note">mp4 · mov · avi · mkv · webm · wmv · flv · m4v</p>
<br>

<div class="card">
  <h2>02 — Parameters</h2>
  <div class="params-grid">

    <div class="param-group full">
      <label>FPS — Frames per second</label>
      <div class="input-row">
        <input type="range" id="fpsRange" min="1" max="30" value="10" oninput="onParamChange('fps', this.value)">
        <div class="value-badge" id="fpsVal">10 fps</div>
      </div>
    </div>

    <div class="param-group full">
      <label>Width — Output width (px)</label>
      <div class="input-row">
        <input type="range" id="widthRange" min="120" max="960" step="40" value="480" oninput="onParamChange('width', this.value)">
        <div class="value-badge" id="widthVal">480 px</div>
      </div>
    </div>

  </div>

  <div id="trimSection">
    <div class="trim-label-row">
      <label>Trim</label>
      <div class="trim-clip-badge">clip: <span id="clipDuration">—</span></div>
    </div>
    <div class="trim-slider-wrap" id="trimSliderWrap">
      <div class="trim-track"></div>
      <div class="trim-range" id="trimRange"></div>
      <div class="trim-handle" id="handleStart"></div>
      <div class="trim-handle" id="handleEnd"></div>
    </div>
    <div class="trim-times">
      <div class="trim-time" id="timeStart">0:00</div>
      <div class="trim-time" id="timeEnd">0:00</div>
    </div>
    <div class="trim-total" id="trimTotal"></div>
  </div>

  <div id="sizeEstimator">
    <div class="estimator-row">
      <span class="estimator-label">Est. output size</span>
      <div class="size-display">
        <div class="size-bar-wrap">
          <div class="size-bar" id="sizeBar"></div>
        </div>
        <div class="size-value" id="sizeValue">—</div>
      </div>
    </div>
    <div class="size-note" id="sizeNote">Target: under 10 MB for easy sharing</div>
  </div>
</div>

<div class="card">
  <h2>03 — Convert</h2>
  <button id="convertBtn" disabled onclick="convert()">Select a video first</button>
  <div id="progressWrap">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar"></div>
    </div>
    <div class="progress-label" id="progressLabel">Uploading...</div>
  </div>
  <div id="errorBox"></div>
</div>

<div class="card" id="resultCard">
  <h2>04 — Result</h2>
  <div class="result-preview">
    <img id="gifPreview" src="" alt="GIF preview">
  </div>
  <div class="result-meta" id="resultMeta"></div>
  <button id="downloadBtn" onclick="downloadGif()">↓ Download GIF</button>
  <div class="history-list" id="historyList" style="display:none">
    <div class="history-label">Previous conversions</div>
    <div id="historyItems"></div>
  </div>
</div>

<script>
let selectedFile = null;
let videoDuration = null;
let trimStart = 0;
let trimEnd = 0;
let activeDrag = null;
let resultFilename = null;
let currentResultMeta = null;
let conversionHistory = [];

const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });

function setFile(file) {
  selectedFile = file;
  videoDuration = null;
  trimStart = 0;
  trimEnd = 0;

  const browseBtn = document.getElementById('browseBtn');
  browseBtn.classList.add('has-file');
  browseBtn.textContent = '✅ ' + file.name;
  document.getElementById('fileName').textContent = formatSize(file.size);
  document.getElementById('errorBox').style.display = 'none';

  const btn = document.getElementById('convertBtn');
  btn.disabled = false;
  btn.textContent = 'Convert to GIF →';

  const url = URL.createObjectURL(file);
  const vid = document.createElement('video');
  vid.preload = 'metadata';
  vid.src = url;
  vid.onloadedmetadata = () => {
    videoDuration = isFinite(vid.duration) ? vid.duration : null;
    window.inputBytesPerSec = videoDuration ? (file.size / videoDuration) : null;
    URL.revokeObjectURL(url);
    if (videoDuration) {
      trimStart = 0;
      trimEnd = videoDuration;
      initTrimSlider();
    }
    document.getElementById('sizeEstimator').style.display = 'block';
    updateEstimate();
  };
  vid.onerror = () => {
    URL.revokeObjectURL(url);
    document.getElementById('sizeEstimator').style.display = 'block';
    updateEstimate();
  };
}

function formatSize(bytes) {
  if (bytes > 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  return (bytes / 1024).toFixed(0) + ' KB';
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

function initTrimSlider() {
  document.getElementById('trimSection').style.display = 'block';
  document.getElementById('trimTotal').textContent = 'total: ' + formatTime(videoDuration);
  updateTrimUI();
}

function updateTrimUI() {
  const pctStart = trimStart / videoDuration;
  const pctEnd = trimEnd / videoDuration;

  document.getElementById('handleStart').style.left = (pctStart * 100) + '%';
  document.getElementById('handleEnd').style.left = (pctEnd * 100) + '%';
  document.getElementById('trimRange').style.left = (pctStart * 100) + '%';
  document.getElementById('trimRange').style.width = ((pctEnd - pctStart) * 100) + '%';
  document.getElementById('timeStart').textContent = formatTime(trimStart);
  document.getElementById('timeEnd').textContent = formatTime(trimEnd);
  document.getElementById('clipDuration').textContent = formatTime(trimEnd - trimStart);

  updateEstimate();
}

document.addEventListener('mousedown', e => {
  if (e.target.id === 'handleStart') { activeDrag = 'start'; e.target.classList.add('dragging'); e.preventDefault(); }
  if (e.target.id === 'handleEnd') { activeDrag = 'end'; e.target.classList.add('dragging'); e.preventDefault(); }
});
document.addEventListener('touchstart', e => {
  if (e.target.id === 'handleStart') activeDrag = 'start';
  if (e.target.id === 'handleEnd') activeDrag = 'end';
}, { passive: true });

document.addEventListener('mousemove', onDrag);
document.addEventListener('touchmove', onDrag, { passive: true });
document.addEventListener('mouseup', stopDrag);
document.addEventListener('touchend', stopDrag);

function onDrag(e) {
  if (!activeDrag || !videoDuration) return;
  const wrap = document.getElementById('trimSliderWrap');
  const rect = wrap.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  let pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const secs = pct * videoDuration;
  const minGap = 0.5;

  if (activeDrag === 'start') {
    trimStart = Math.max(0, Math.min(secs, trimEnd - minGap));
  } else {
    trimEnd = Math.min(videoDuration, Math.max(secs, trimStart + minGap));
  }
  updateTrimUI();
}

function stopDrag() {
  if (!activeDrag) return;
  document.getElementById('handle' + (activeDrag === 'start' ? 'Start' : 'End')).classList.remove('dragging');
  activeDrag = null;
}

function onParamChange(type, val) {
  if (type === 'fps') document.getElementById('fpsVal').textContent = val + ' fps';
  else document.getElementById('widthVal').textContent = val + ' px';
  updateEstimate();
}

function updateEstimate() {
  if (!selectedFile) return;

  const fps = parseInt(document.getElementById('fpsRange').value);
  const width = parseInt(document.getElementById('widthRange').value);
  const effectiveDuration = videoDuration ? (trimEnd - trimStart) : null;

  if (!effectiveDuration) {
    document.getElementById('sizeValue').textContent = '?';
    document.getElementById('sizeNote').textContent = 'Duration unknown — estimate unavailable';
    return;
  }

  const LOW_BPS = 500_000;
  const HIGH_BPS = 8_000_000;
  const LOW_CONST = 2.0;
  const HIGH_CONST = 6.5;

  let complexityFactor = 0.5;
  if (window.inputBytesPerSec) {
    complexityFactor = Math.max(0, Math.min(1,
      (window.inputBytesPerSec - LOW_BPS) / (HIGH_BPS - LOW_BPS)
    ));
  }

  const bitsPerPixelPerFrame = LOW_CONST + (HIGH_CONST - LOW_CONST) * complexityFactor;
  const height = Math.round(width * 9 / 16);
  const estimatedBytes = (width * height * fps * effectiveDuration * bitsPerPixelPerFrame) / 8;
  const estimatedMB = estimatedBytes / (1024 * 1024);

  const sizeValue = document.getElementById('sizeValue');
  const sizeBar = document.getElementById('sizeBar');
  const sizeNote = document.getElementById('sizeNote');

  sizeValue.textContent = estimatedMB.toFixed(1) + ' MB';
  const pct = Math.min((estimatedMB / 40) * 100, 100);
  sizeBar.style.width = pct + '%';

  sizeValue.className = 'size-value';
  sizeBar.className = 'size-bar';

  if (estimatedMB <= 10) {
    sizeValue.classList.add('green');
    sizeBar.classList.add('green');
    sizeNote.textContent = '✓ Under 10 MB — good to go';
  } else if (estimatedMB <= 25) {
    sizeValue.classList.add('yellow');
    sizeBar.classList.add('yellow');
    sizeNote.textContent = '⚠ Getting large — consider lower FPS or width';
  } else {
    sizeValue.classList.add('red');
    sizeBar.classList.add('red');
    sizeNote.textContent = '✗ Very large — reduce FPS, width, or clip length';
  }
}

async function convert() {
  if (!selectedFile) return;

  const btn = document.getElementById('convertBtn');
  const progressWrap = document.getElementById('progressWrap');
  const errorBox = document.getElementById('errorBox');

  errorBox.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Converting...';
  progressWrap.style.display = 'flex';
  animateProgress();

  const formData = new FormData();
  formData.append('file', selectedFile);
  formData.append('fps', document.getElementById('fpsRange').value);
  formData.append('width', document.getElementById('widthRange').value);
  formData.append('start_time', trimStart.toFixed(2));
  if (videoDuration) {
    formData.append('duration', (trimEnd - trimStart).toFixed(2));
  }

  try {
    const resp = await fetch('/convert', { method: 'POST', body: formData });
    const data = await resp.json();
    stopProgress();

    if (!resp.ok || data.error) {
      showError(data.error || 'Conversion failed');
      btn.disabled = false;
      btn.textContent = 'Convert to GIF →';
      return;
    }

    if (resultFilename && currentResultMeta) {
      conversionHistory.unshift({ filename: resultFilename, ...currentResultMeta });
      renderHistory();
    }

    resultFilename = data.filename;
    currentResultMeta = {
      sizeMB: data.size_mb,
      fps: document.getElementById('fpsRange').value,
      width: document.getElementById('widthRange').value
    };

    showResult(data);
    btn.disabled = false;
    btn.textContent = 'Convert to GIF →';

  } catch (err) {
    stopProgress();
    showError('Request failed: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Convert to GIF →';
  }
}

let progressInterval = null;
let progressVal = 0;

function animateProgress() {
  progressVal = 0;
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressLabel').textContent = 'Uploading...';
  progressInterval = setInterval(() => {
    if (progressVal < 30) { progressVal += 2; document.getElementById('progressLabel').textContent = 'Uploading...'; }
    else if (progressVal < 85) { progressVal += 0.4; document.getElementById('progressLabel').textContent = 'Generating palette & converting...'; }
    else if (progressVal < 95) { progressVal += 0.1; document.getElementById('progressLabel').textContent = 'Almost done...'; }
    document.getElementById('progressBar').style.width = progressVal + '%';
  }, 80);
}

function stopProgress() {
  clearInterval(progressInterval);
  document.getElementById('progressBar').style.width = '100%';
  setTimeout(() => { document.getElementById('progressWrap').style.display = 'none'; }, 400);
}

function showResult(data) {
  const resultCard = document.getElementById('resultCard');
  resultCard.style.display = 'block';
  document.getElementById('gifPreview').src = '/preview/' + data.filename + '?t=' + Date.now();
  document.getElementById('resultMeta').innerHTML = `
    <div class="meta-chip">actual size <span>${data.size_mb} MB</span></div>
    <div class="meta-chip">fps <span>${currentResultMeta.fps}</span></div>
    <div class="meta-chip">width <span>${currentResultMeta.width}px</span></div>
  `;
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderHistory() {
  if (!conversionHistory.length) return;
  document.getElementById('historyList').style.display = 'block';
  document.getElementById('historyItems').innerHTML = conversionHistory.map(item => `
    <div class="history-item">
      <div class="hi-name">${item.filename}</div>
      <div class="hi-meta">${item.fps} fps · ${item.width}px · ${item.sizeMB} MB</div>
      <a class="hi-dl" href="/download/${item.filename}">↓</a>
    </div>
  `).join('');
}

function downloadGif() {
  if (resultFilename) window.location.href = '/download/' + resultFilename;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}
</script>
</body>
</html>
